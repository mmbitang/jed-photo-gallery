<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jed Photo Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">Gallery</p>
      <h1>Crised-Studio Previews.</h1>
      <p class="intro">
        This site indexes one public Google Drive root folder, preserves the folder tree,
        and provides global search across every image found under it.
      </p>
      <div class="hero-meta">
        <span id="statusBadge" class="status-badge">Waiting for configuration</span>
        <span id="statsText" class="stats-text">0 folders · 0 photos</span>
      </div>
    </header>

    <main class="workspace">
      <section class="toolbar" aria-label="Gallery controls">
        <label class="search-field" for="searchInput">
          <span>Search all photos</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Search by file name or folder path"
            autocomplete="off"
          >
        </label>
        <div class="toolbar-actions">
          <div class="theme-toggle" role="group" aria-label="Theme selection">
            <button id="themeLightButton" class="theme-button" type="button" data-theme-value="light">Light</button>
            <button id="themeDarkButton" class="theme-button" type="button" data-theme-value="dark">Dark</button>
            <button id="themeSystemButton" class="theme-button is-active" type="button" data-theme-value="system">System</button>
          </div>
          <button id="clearSearchButton" class="ghost-button" type="button">Clear search</button>
        </div>
      </section>

      <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>

      <section id="message" class="message-panel" aria-live="polite"></section>

      <section id="gallery" class="gallery-grid" aria-live="polite"></section>
    </main>
  </div>

  <div id="previewModal" class="preview-modal" hidden>
    <div class="preview-backdrop" data-preview-close="true"></div>
    <section class="preview-dialog" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
      <div class="preview-topbar">
        <div class="preview-copy">
          <p class="preview-kicker">Photo Preview</p>
          <h2 id="previewTitle">Photo</h2>
          <p id="previewMeta" class="preview-meta"></p>
        </div>
        <div class="preview-actions">
          <a id="previewDownload" class="ghost-button" href="#" target="_blank" rel="noopener">Download</a>
          <button id="previewCloseButton" class="ghost-button" type="button" aria-label="Close preview">Close</button>
        </div>
      </div>

      <div class="preview-stage">
        <button id="previewPrevButton" class="preview-nav preview-nav-prev" type="button" aria-label="Previous photo">Previous</button>
        <div class="preview-image-wrap">
          <img id="previewImage" class="preview-image" src="" alt="">
        </div>
        <button id="previewNextButton" class="preview-nav preview-nav-next" type="button" aria-label="Next photo">Next</button>
      </div>

      <div id="previewThumbs" class="preview-thumbs" aria-label="Preview thumbnails"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
